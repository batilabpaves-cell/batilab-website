<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 58" width="280" height="58">
  <!-- Icône carrée avec monogramme BL -->
  <rect x="0" y="1" width="54" height="54" rx="6" fill="#c9a227"/>
  <rect x="4" y="5" width="46" height="46" rx="4" fill="#0b0b07"/>
  <!-- Ligne décorative dorée centrale -->
  <line x1="13" y1="28" x2="41" y2="28" stroke="#c9a227" stroke-width="0.8" opacity="0.4"/>
  <!-- Monogramme BL -->
  <text x="27" y="22"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="11" font-weight="bold"
        fill="#c9a227" text-anchor="middle" letter-spacing="1">B</text>
  <text x="27" y="38"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="11" font-weight="bold"
        fill="#c9a227" text-anchor="middle" letter-spacing="1">L</text>

  <!-- Nom entreprise -->
  <text x="68" y="27"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="21" font-weight="bold"
        fill="#c9a227" letter-spacing="3">BATILAB</text>
  <!-- Sous-titre -->
  <text x="70" y="44"
        font-family="Arial, Helvetica, sans-serif"
        font-size="9.5"
        fill="rgba(255,255,255,0.75)"
        letter-spacing="5.5">TECHNOLOGY</text>
</svg>
